<!DOCTYPE html>

<html lang="en">
	
	<head>
		<meta charset="UTF-8">
		<title>Another Platformer</title>
		<link href="css/sitecss.css" rel="stylesheet" type="text/css"/>
	</head>

	<body>
		<div id="header"></div>

		<main>
            <section>
                <h2>Reach out!</h2>
                <p>
                    Tell me how you are enjoying the project so far! I am always considering feedback and how I can improve the overall experience.
                </p>
                <br/>
                <br/>

                <h2>Contact Form</h2>
                <br/>
                
                <form action="#" method="get" name="contact-form">
                    <div style="text-align: center;">
                        Name: <input type="text" id="name" required />&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                        Email: <input type="email" id="email" required/>
                        <br/>
                        <br/>
                        Feedback: <br/><textarea id="feedback" maxlength="500" cols="50" rows="12"></textarea>
                        <br/>
                        <br/>
                        Would you like me to respond? <br/>
                        No <input type="radio" name="respond" checked="checked"/> &nbsp;&nbsp;&nbsp;&nbsp;
                        Yes <input type="radio" name="respond"/>
                        <br/><br/>
                        <input type="submit" value="Send off!"/>
                    </div>
                </form>
            </section>
        </main>

        <div id="footer"></div>

		<script src="scripts/include.js"></script>
    </body>
</html>
